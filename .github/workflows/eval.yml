name: LLM Regression Eval

on:
  pull_request:
    paths:
      - "prompts/**"
      - "data/**"
      - "src/**"
      - ".github/workflows/eval.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run eval
        id: run_eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WARNING_DROP: "0.03"
          CRITICAL_DROP: "0.08"
          DRIFT_AVG_MIN: "0.85"
        run: |
          set +e
          python -m model_regression.cli \
            --prompt prompts/v1.yaml \
            --dataset data/golden_dataset_v1.json \
            --model gpt-4o-mini \
            --judge-model gpt-4o-mini \
            --db runs/evals.db \
            --report-dir reports
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: llm-regression-report
          path: reports/

      - name: Comment summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.existsSync('reports/summary.md')
              ? fs.readFileSync('reports/summary.md', 'utf8')
              : 'Eval finished, but no summary.md was generated.';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

      - name: Block merge on critical regression
        if: steps.run_eval.outputs.exit_code != '0'
        run: |
          echo "Critical LLM regression detected. Blocking merge."
          exit 1
